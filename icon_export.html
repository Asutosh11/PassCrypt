<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <canvas id="c" width="512" height="512"></canvas>
    <a id="dl"
        style="font-family:sans-serif;font-size:18px;padding:12px 24px;background:#2979FF;color:#fff;text-decoration:none;border-radius:8px;">⬇
        Download PNG</a>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const SIZE = 512;

        // --- Background: vivid blue circle ---
        ctx.beginPath();
        ctx.arc(SIZE / 2, SIZE / 2, SIZE / 2, 0, Math.PI * 2);
        ctx.fillStyle = '#2979FF';
        ctx.fill();

        // --- Subtle dot grid ---
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        const spacing = 40;
        for (let x = spacing; x < SIZE; x += spacing) {
            for (let y = spacing; y < SIZE; y += spacing) {
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // --- Scale: icon is designed in 24-unit space, map to 512 ---
        const scale = SIZE / 24;

        // --- Padlock body (white rounded rectangle) ---
        // In 24-unit space: x=7.5,y=11,w=9,h=8 with radius ~0.5
        const bx = 7.5 * scale, by = 11 * scale, bw = 9 * scale, bh = 8 * scale, br = 0.5 * scale;
        ctx.beginPath();
        ctx.moveTo(bx + br, by);
        ctx.lineTo(bx + bw - br, by);
        ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + br);
        ctx.lineTo(bx + bw, by + bh - br);
        ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - br, by + bh);
        ctx.lineTo(bx + br, by + bh);
        ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - br);
        ctx.lineTo(bx, by + br);
        ctx.quadraticCurveTo(bx, by, bx + br, by);
        ctx.closePath();
        ctx.fillStyle = '#FFFFFF';
        ctx.fill();

        // --- Shackle arc (white stroke) ---
        // Arc from (9.5,11) up through (12,5.5) to (14.5,11) in 24-unit space
        ctx.beginPath();
        ctx.moveTo(9.5 * scale, 11 * scale);
        ctx.lineTo(9.5 * scale, 8.5 * scale);
        ctx.arcTo(9.5 * scale, 5.5 * scale, 12 * scale, 5.5 * scale, 2.5 * scale);
        ctx.arcTo(14.5 * scale, 5.5 * scale, 14.5 * scale, 8.5 * scale, 2.5 * scale);
        ctx.lineTo(14.5 * scale, 11 * scale);
        ctx.strokeStyle = '#FFFFFF';
        ctx.lineWidth = 1.3 * scale;
        ctx.lineCap = 'round';
        ctx.stroke();

        // --- Keyhole circle (blue) ---
        ctx.beginPath();
        ctx.arc(12 * scale, 14.2 * scale, 1.3 * scale, 0, Math.PI * 2);
        ctx.fillStyle = '#2979FF';
        ctx.fill();

        // --- Keyhole stem (blue rectangle) ---
        ctx.fillStyle = '#2979FF';
        ctx.fillRect(11.3 * scale, 15.2 * scale, 1.4 * scale, 2.3 * scale);

        // --- Download link ---
        const a = document.getElementById('dl');
        a.href = canvas.toDataURL('image/png');
        a.download = 'passcrypt_icon_512.png';
    </script>
</body>

</html>
